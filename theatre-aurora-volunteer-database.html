<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre Aurora Volunteer Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            padding: 40px 50px;
            background: #fff;
            color: #000;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            font-weight: normal;
            margin-bottom: 30px;
        }

        .page-layout {
            display: flex;
            gap: 50px;
        }

        .left-column {
            flex: 1;
            max-width: 520px;
        }

        .right-column {
            flex: 1;
            max-width: 520px;
        }

        /* Contact Info Section */
        .contact-info {
            margin-bottom: 24px;
        }

        .contact-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .contact-row label {
            width: 140px;
            font-size: 15px;
            font-weight: bold;
            text-align: left;
        }

        .contact-row input[type="text"] {
            flex: 1;
            border: 1px solid #000;
            padding: 3px 5px;
            font-size: 14px;
            height: 24px;
            background: #fff;
        }

        .contact-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            border: 1px solid #000;
            cursor: pointer;
        }

        /* Section Headers */
        .section-header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 4px;
            margin-top: 20px;
        }

        /* Data Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #000;
            margin-bottom: 10px;
        }

        .data-table th {
            border: 1px solid #000;
            padding: 4px 8px;
            font-size: 14px;
            font-weight: normal;
            font-style: italic;
            text-align: center;
            background: #fff;
        }

        .data-table td {
            border: 1px solid #000;
            padding: 4px 8px;
            font-size: 14px;
            vertical-align: top;
        }

        .data-table .empty-cell {
            height: 200px;
        }

        .data-table .empty-cell-short {
            height: 140px;
        }

        /* Subscriber History Box */
        .subscriber-box {
            width: 100%;
            border: 1px solid #000;
            min-height: 160px;
            padding: 8px;
        }

        /* Three Column Table */
        .three-col th:nth-child(1),
        .three-col td:nth-child(1) {
            width: 30%;
        }
        .three-col th:nth-child(2),
        .three-col td:nth-child(2) {
            width: 35%;
        }
        .three-col th:nth-child(3),
        .three-col td:nth-child(3) {
            width: 35%;
        }

        /* Two Column Table */
        .two-col th:nth-child(1),
        .two-col td:nth-child(1) {
            width: 45%;
        }
        .two-col th:nth-child(2),
        .two-col td:nth-child(2) {
            width: 55%;
        }
    </style>
</head>
<body>

    <h1>Theatre Aurora Volunteer Database</h1>

    <div class="page-layout">
        <!-- Left Column -->
        <div class="left-column">
            <!-- Contact Information -->
            <div class="contact-info">
                <div class="contact-row">
                    <label>Name:</label>
                    <input type="text">
                </div>
                <div class="contact-row">
                    <label>Address:</label>
                    <input type="text">
                </div>
                <div class="contact-row">
                    <label>Home Phone:</label>
                    <input type="text">
                </div>
                <div class="contact-row">
                    <label>Cell Phone:</label>
                    <input type="text">
                </div>
                <div class="contact-row">
                    <label>Work Phone:</label>
                    <input type="text">
                </div>
                <div class="contact-row">
                    <label>No Email:</label>
                    <input type="checkbox">
                </div>
                <div class="contact-row">
                    <label>Record Created:</label>
                    <input type="text">
                </div>
                <div class="contact-row">
                    <label>Last Activity:</label>
                    <input type="text">
                </div>
                <div class="contact-row">
                    <label>Last Updated:</label>
                    <input type="text">
                </div>
            </div>

            <!-- Tickets Purchased History -->
            <div class="section-header">Tickets Purchased History</div>
            <table class="data-table three-col">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Show</th>
                        <th>Tickets Purchased</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="empty-cell"></td>
                        <td class="empty-cell"></td>
                        <td class="empty-cell"></td>
                    </tr>
                </tbody>
            </table>

            <!-- Subscriber History -->
            <div class="section-header">Subscriber History</div>
            <div class="subscriber-box"></div>
        </div>

        <!-- Right Column -->
        <div class="right-column">
            <!-- Volunteer Roles -->
            <div class="section-header" style="margin-top: 0;">Volunteer Roles</div>
            <table class="data-table three-col">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Show</th>
                        <th>Role</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="empty-cell"></td>
                        <td class="empty-cell"></td>
                        <td class="empty-cell"></td>
                    </tr>
                </tbody>
            </table>

            <!-- Emails Sent -->
            <div class="section-header">Emails Sent</div>
            <table class="data-table two-col">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Subject</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="empty-cell-short"></td>
                        <td class="empty-cell-short"></td>
                    </tr>
                </tbody>
            </table>

            <!-- Contacts Made -->
            <div class="section-header">Contacts Made</div>
            <table class="data-table three-col">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Subject</th>
                        <th>How</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="empty-cell-short"></td>
                        <td class="empty-cell-short"></td>
                        <td class="empty-cell-short"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
