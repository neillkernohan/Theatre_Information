<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre Information — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            text-align: center;
            max-width: 400px;
            padding: 40px;
        }
        .login-container img {
            max-width: 80%;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="{{ url_for('static', filename='Media/Wide Logo Centred Black.png') }}" alt="Theatre Logo">
        <h4 class="mb-4">Theatre Information Dashboard</h4>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Enter password" autofocus>
            </div>
            <button type="submit" class="btn btn-dark w-100">Log In</button>
        </form>
    </div>
</body>
</html>
