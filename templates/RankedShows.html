<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranked Shows</title>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th>Show Name</th>
                <th>Show Type</th>
                <th>Latest Performance Date</th>
                <th>Rank Within Type</th>
                <th>Total Shows In Type</th>
                <th>Top Show In Category</th>
            </tr>
        </thead>
        <tbody>
            {% for row in data %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                    <td>{{ row[4] }}</td>
                    <td>{{ row[5] }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
