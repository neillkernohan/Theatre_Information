<!DOCTYPE html>
<html lang="en">
<head>

    <title>Theatre Information</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;

        }
        .home-container {

<body>
    <div class="home-container">
        <img src="{{ url_for('static', filename='Media/Wide Logo Centred Black.png') }}" alt="Theatre Logo">

        <a href="/SeasonTotals" class="btn btn-dark btn-theatre">Season Totals</a>
    </div>

</html>
