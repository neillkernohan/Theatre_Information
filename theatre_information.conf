<VirtualHost *:80>
    ServerName 174.138.178.166

    WSGIDaemonProcess flaskapp user=www-data group=www-data threads=5
    WSGIScriptAlias / /var/www/theatre_information/app.wsgi

    <Directory /var/www/theatre_information>
        WSGIProcessGroup flaskapp
        WSGIApplicationGroup %{GLOBAL}
        Order deny,allow
        Allow from all
    </Directory>

    Alias /static /var/www/theatre_information/static

    <Directory /var/www/basic-flask-app/static>
        Order allow,deny
        Allow from all
    </Directory>

    Alias /templates /var/www/theatre_information/templates

    <Directory /var/www/theatre_information/templates>
        Order allow,deny
        Allow from all
    </Directory>

    ErrorLog /var/www/theatre_information/logs/error.log
    CustomLog /var/www/theatre_information/logs/access.log combined
</VirtualHost>
